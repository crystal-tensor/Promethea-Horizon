name: R186 full VF2 workflow Linux x86-64 replay

on:
  workflow_dispatch:
    inputs:
      preregistration_commit:
        description: Public execution commit
        required: true
        type: string
      preregistration_discussion:
        description: Public GitHub Discussion URL
        required: true
        type: string
      preregistration_created_at:
        description: GitHub Discussion creation time in UTC
        required: true
        type: string

permissions:
  contents: read

jobs:
  full-vf2-workflow-linux-x86-64:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      MKL_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      PYTHONHASHSEED: "0"
      QISKIT_PARALLEL: "FALSE"
      RAYON_NUM_THREADS: "1"
    steps:
      - name: Check out the public execution commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.preregistration_commit }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned quantum dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "PyYAML>=6.0" \
            "numpy>=1.26" \
            "scipy>=1.11" \
            "qiskit==2.4.1" \
            "qiskit-aer>=0.17" \
            "qiskit-ibm-runtime==0.46.1" \
            "qiskit-qasm3-import>=0.6"

      - name: Verify committed Linux extension identity
        run: |
          file research/source_lineage/Qiskit_2_4_1_R184_window_exact_pyext.x86_64-linux-gnu.so
          shasum -a 256 research/source_lineage/Qiskit_2_4_1_R184_window_exact_pyext.x86_64-linux-gnu.so

      - name: Execute frozen Linux full-workflow matrix
        run: |
          PYTHONPATH=tools python tools/b4_b8_r186_full_vf2_workflow_replay.py \
            --platform linux_x86_64 \
            --preregistration-commit "${{ inputs.preregistration_commit }}" \
            --preregistration-discussion "${{ inputs.preregistration_discussion }}" \
            --preregistration-created-at "${{ inputs.preregistration_created_at }}"

      - name: Enforce Linux platform evidence completeness
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("results/B4_B8_R186_full_vf2_workflow_linux_x86_64_v0.json").read_text())
          if result["requirements_failed"] or result["worker_count"] != 13:
              raise SystemExit("R186 Linux platform evidence gate failed")
          print(json.dumps({
              "status": result["status"],
              "requirements": [result["requirements_passed"], result["requirements_failed"]],
              "hypothesis_support": result["hypothesis_support"],
              "payload_hash": result["payload_hash"],
          }, indent=2, sort_keys=True))
          PY

      - name: Write job summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("results/B4_B8_R186_full_vf2_workflow_linux_x86_64_v0.json")
          lines = ["# R186 full VF2 workflow Linux x86-64 replay"]
          if path.exists():
              result = json.loads(path.read_text())
              lines.extend([
                  "",
                  f"- Status: `{result['status']}`",
                  f"- Result: `{result['payload_hash']}`",
                  f"- Mapping checks: `{result['mapping_match_count']}/{result['mapping_check_count']}`",
                  f"- Direct window/BigUint: `{result['aggregate_surface_ratios']['accelerator_entrypoint']['candidate_to_baseline_paired_median']:.9f}x`",
                  f"- PassManager window/BigUint: `{result['aggregate_surface_ratios']['python_passmanager']['candidate_to_baseline_paired_median']:.9f}x`",
                  f"- Retained saving: `{result['relative_saving_retention_fraction']:.9f}`",
              ])
          Path("/tmp/r186-summary.md").write_text("\n".join(lines) + "\n")
          PY
          cat /tmp/r186-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Linux R186 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r186-full-vf2-workflow-linux-x86-64-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            research/B4_B8_R186_full_vf2_workflow_linux_x86_64.md
            results/B4_B8_R186_full_vf2_workflow_linux_x86_64_replay
            results/B4_B8_R186_full_vf2_workflow_linux_x86_64_v0.json
